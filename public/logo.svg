<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Ledger book shape -->
  <rect x="120" y="96" width="280" height="320" rx="20" fill="white" opacity="0.95"/>
  <rect x="108" y="108" width="20" height="296" rx="10" fill="white" opacity="0.6"/>
  <!-- Horizontal ledger lines -->
  <line x1="160" y1="180" x2="360" y2="180" stroke="#3b82f6" stroke-width="3" opacity="0.3"/>
  <line x1="160" y1="220" x2="360" y2="220" stroke="#3b82f6" stroke-width="3" opacity="0.3"/>
  <line x1="160" y1="260" x2="360" y2="260" stroke="#3b82f6" stroke-width="3" opacity="0.3"/>
  <line x1="160" y1="300" x2="360" y2="300" stroke="#3b82f6" stroke-width="3" opacity="0.3"/>
  <line x1="160" y1="340" x2="360" y2="340" stroke="#3b82f6" stroke-width="3" opacity="0.3"/>
  <!-- Vertical divider (borç/alacak separator) -->
  <line x1="280" y1="150" x2="280" y2="380" stroke="#3b82f6" stroke-width="3" opacity="0.25"/>
  <!-- Turkish Lira symbol ₺ -->
  <text x="260" y="310" font-family="Arial, sans-serif" font-size="160" font-weight="700" fill="#1d4ed8" text-anchor="middle" opacity="0.85">₺</text>
</svg>
