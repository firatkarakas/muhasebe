name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        run: npx tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Create release with updater
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $bundleDir = "src-tauri/target/release/bundle/nsis"
          $nsisZip = Get-ChildItem -Path $bundleDir -Filter "*.nsis.zip" | Select-Object -First 1
          $nsisSig = Get-ChildItem -Path $bundleDir -Filter "*.nsis.zip.sig" | Select-Object -First 1
          $setupExe = Get-ChildItem -Path $bundleDir -Filter "*-setup.exe" | Select-Object -First 1

          $conf = Get-Content "src-tauri/tauri.conf.json" | ConvertFrom-Json
          $version = $conf.version
          $sigContent = Get-Content $nsisSig.FullName -Raw

          Write-Host "Version: $version"
          Write-Host "NSIS ZIP: $($nsisZip.Name)"
          Write-Host "Signature: $($nsisSig.Name)"
          Write-Host "Setup EXE: $($setupExe.Name)"

          $zipName = $nsisZip.Name
          $downloadUrl = "https://github.com/${{ github.repository }}/releases/download/v${version}/${zipName}"

          $latestJson = @{
            version = $version
            notes = "Yeni sürüm yayınlandı."
            pub_date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              "windows-x86_64" = @{
                signature = $sigContent.Trim()
                url = $downloadUrl
              }
            }
          } | ConvertTo-Json -Depth 4

          $latestJson | Out-File -FilePath "latest.json" -Encoding utf8NoBOM
          Write-Host "latest.json content:"
          Get-Content "latest.json"

          gh release create "v${version}" `
            --title "Yavuz Turgut Muhasebe v${version}" `
            --notes "Yeni sürüm yayınlandı." `
            $setupExe.FullName `
            $nsisZip.FullName `
            "latest.json"
